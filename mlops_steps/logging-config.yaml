---
version: 1
disable_existing_loggers: False
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

# Example of how to set a handler on module level.
#loggers:
#  module_name:
#    level: INFO
#    handlers: [console, file_handler]
#    propagate: no

root:
  level: INFO
  handlers: [console]